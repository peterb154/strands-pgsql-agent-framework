name: release

# Auto-tag on pushes to main, based on Conventional Commits since the last
# tag. Uses python-semantic-release. No PyPI publish — this project is
# distributed as source via install.sh, so the workflow only produces a tag
# and a GitHub Release with autogenerated notes.
#
# Version bumps:
#   feat:              -> minor (0.x.0)
#   fix:               -> patch (0.0.x)
#   feat! / BREAKING:  -> major (x.0.0)
#   docs:/chore:/etc:  -> no release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never run two releases concurrently; they'd fight over the version file.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for commit analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v9.21.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
