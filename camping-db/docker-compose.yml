# camping-db agent + db. Runs alongside example/ on a different host port
# so both stacks can be up at once.

services:
  db:
    build:
      context: ..
      dockerfile: images/db/Dockerfile
    image: strands-pg-db:local
    environment:
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands
    volumes:
      - camping_pgdata:/var/lib/postgresql/data
    ports:
      # expose on 5433 so host scripts (ingest.py) can reach this db without
      # colliding with the example stack.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strands -d strands"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: camping-db/Dockerfile
    image: strands-pg-camping-db:local
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      STRANDS_PG_DSN: postgresql://strands:strands@db:5432/strands
    volumes:
      # rw: boto3 refreshes SSO tokens into ~/.aws/sso/cache at runtime.
      - ${HOME}/.aws:/root/.aws
      # legacy data mounted read-only so ingest.py can reach camping.db,
      # parcel_services.json, identities/*.md. Not required at runtime —
      # only for the one-shot ingest.
      - ${HOME}/Projects/personal/camping-db/data:/legacy:ro
    ports:
      - "8001:8000"
    restart: unless-stopped

  # Optional: auto-CRUD for tables granted to web_anon (see
  # migrations/102_pgrst_role.sql). Remove this block if you don't want an
  # admin/data API. PostgREST is a Haskell binary; it runs next to Postgres,
  # not inside the agent process.
  postgrest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://strands:strands@db:5432/strands
      # Expose only the api schema. Keeps PostGIS's ~250 ST_* functions out
      # of the OpenAPI doc, and keeps framework tables (sessions, memories,
      # prompts, identities) entirely invisible to the HTTP surface.
      PGRST_DB_SCHEMAS: api
      PGRST_DB_EXTRA_SEARCH_PATH: "api, public"
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  camping_pgdata:
