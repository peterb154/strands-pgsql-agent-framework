# Reference stack: agent + db. One LXC per pair.
#
# Start:
#   docker compose up --build
#
# AWS creds for Bedrock are passed through from the host via ~/.aws mount.
# Swap in an env-file or IAM role in production.

services:
  db:
    build:
      context: ..
      dockerfile: images/db/Dockerfile
    image: strands-pg-db:local
    environment:
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strands -d strands"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: example/Dockerfile
    image: strands-pg-example:local
    depends_on:
      db:
        condition: service_healthy
    env_file:
      # .env in this directory. Copy from .env.example. env_file loads into
      # the *container* environment directly, so host shell exports (e.g.
      # AWS_PROFILE=saml) don't leak in via ${...} substitution.
      - .env
    environment:
      STRANDS_PG_DSN: postgresql://strands:strands@db:5432/strands
    volumes:
      # Pass through host AWS creds for Bedrock calls. In production, use an
      # IAM role or a scoped env-file instead.
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
